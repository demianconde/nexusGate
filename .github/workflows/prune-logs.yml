name: Prune usage_logs

# Retenção de custo: apaga usage_logs > 90 dias (principal custo variável do free).
on:
  schedule:
    - cron: "17 4 * * *"   # ~01h BRT (04:17 UTC) todo dia
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/prune_usage_logs.py --days 90
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
